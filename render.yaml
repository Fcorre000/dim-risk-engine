services:
  - type: web
    name: dim-risk-api
    env: python
    region: oregon
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: ../models
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: dim-risk-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
