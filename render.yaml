services:
  - type: web
    name: dim-risk-api
    env: python
    region: oregon
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: ../models
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
