name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly audit catches CVEs filed against already-pinned versions —
  # the codebase doesn't have to change for a dep to become vulnerable.
  schedule:
    - cron: '17 4 * * 1'

jobs:
  backend:
    name: api · pytest + pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Note: pytest is not run in CI yet because the XGBoost .ubj model
      # binaries aren't fetched here. Wire up a model-download step
      # (e.g. from S3 or GitHub release asset) before adding `pytest -q`.

      - name: pip-audit (SCA)
        run: |
          pip install pip-audit==2.7.3
          pip-audit --strict --requirement requirements.txt

  frontend:
    name: frontend · build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: npm audit (high+)
        # `npm audit` exits non-zero on findings; `--audit-level=high` scopes
        # the gate to high/critical so moderate lockfile noise doesn't block PRs.
        run: npm audit --audit-level=high --omit=dev
